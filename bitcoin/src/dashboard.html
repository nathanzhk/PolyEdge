<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BTC Combined Price</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --border: #d9dde3;
      --grid: #e6e9ee;
      --text: #20242c;
      --muted: #6d7683;
      --green: #178c4f;
      --red: #c33d44;
      --coinbase: #2558d9;
      --binance: #d89b00;
      --gemini: #008f7a;
      --bitstamp: #7b4cc2;
      --bybit: #cf4a7a;
      --combined: #f08c00;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .shell {
      height: 100vh;
      padding: 20px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-content: start;
      min-width: 0;
    }

    .dashboardGrid {
      min-height: 0;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 14px;
      overflow: hidden;
    }

    .quote {
      min-width: 0;
      min-height: 74px;
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 8px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
    }

    .quoteMain,
    .quoteMeta {
      min-width: 0;
    }

    .label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      text-transform: uppercase;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      flex: 0 0 auto;
      background: currentColor;
    }

    .price {
      margin-top: 6px;
      font-variant-numeric: tabular-nums;
      font-size: 22px;
      font-weight: 760;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .change {
      font-variant-numeric: tabular-nums;
      font-size: 14px;
      font-weight: 700;
    }

    .meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 7px;
      white-space: nowrap;
    }

    .delay {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      font-weight: 650;
      min-height: 15px;
    }

    .positive { color: var(--green); }
    .negative { color: var(--red); }

    .chartPanel {
      min-height: 0;
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 8px;
      padding: 14px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
      overflow: hidden;
    }

    .chartHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      min-width: 0;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .legendItem {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 650;
      white-space: nowrap;
    }

    .window {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .canvasWrap {
      min-height: 0;
      position: relative;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (max-width: 1180px) {
      .dashboardGrid {
        grid-template-columns: 260px minmax(0, 1fr);
      }
    }

    @media (max-width: 620px) {
      body { overflow: auto; }
      .shell { padding: 12px; }
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
      .dashboardGrid {
        grid-template-columns: 1fr;
        overflow: visible;
      }
      .chartPanel {
        min-height: 420px;
      }
      .price { font-size: 21px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <h1>BTC Exchange Composite</h1>
      <div class="status" id="status">Connecting</div>
    </header>

    <section class="dashboardGrid">
      <section class="summary" id="summary"></section>

      <section class="chartPanel">
        <div class="chartHeader">
          <div class="legend" id="legend"></div>
          <div class="window" id="window">Window --</div>
        </div>
        <div class="canvasWrap">
          <canvas id="chart"></canvas>
        </div>
      </section>
    </section>
  </main>

  <script>
    const series = [
      { key: "bybit", name: "Bybit", color: "#cf4a7a" },
      { key: "gemini", name: "Gemini", color: "#008f7a" },
      { key: "binance", name: "Binance", color: "#d89b00" },
      { key: "bitstamp", name: "Bitstamp", color: "#7b4cc2" },
      { key: "coinbase", name: "Coinbase", color: "#2558d9" },
      { key: "combined", name: "Combined", color: "#f08c00", width: 3 },
    ];

    const chartWindowMs = 20_000;
    const maxChartPoints = 12_000;
    const points = [];
    let latest = null;
    let socket = null;
    let reconnectTimer = null;
    let needsRender = true;

    const statusEl = document.getElementById("status");
    const summaryEl = document.getElementById("summary");
    const legendEl = document.getElementById("legend");
    const windowEl = document.getElementById("window");
    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    const priceFormat = new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      minimumFractionDigits: 2,
      maximumFractionDigits: 2,
    });

    const compactPriceFormat = new Intl.NumberFormat("en-US", {
      style: "currency",
      currency: "USD",
      minimumFractionDigits: 0,
      maximumFractionDigits: 0,
    });

    function isNumber(value) {
      return Number.isFinite(value);
    }

    function formatPrice(value) {
      return isNumber(value) ? priceFormat.format(value) : "--";
    }

    function signed(value) {
      if (!isNumber(value)) {
        return "--";
      }
      const sign = value >= 0 ? "+" : "";
      return sign + priceFormat.format(value);
    }

    function formatDelay(value) {
      return isNumber(value) ? value.toFixed(1) + " ms" : "--";
    }

    function timeLabel(seconds) {
      return new Date(seconds * 1000).toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
      });
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function renderStaticUi() {
      summaryEl.innerHTML = series.map((item) => [
        "<article class=\"quote\">",
        "<div class=\"quoteMain\">",
        "<div class=\"label\" style=\"color:", item.color, "\">",
        "<span class=\"dot\"></span><span>", item.name, "</span>",
        "</div>",
        "<div class=\"price\" id=\"price-", item.key, "\">--</div>",
        "</div>",
        "<div class=\"meta\">",
        "<div class=\"change\" id=\"change-", item.key, "\">--</div>",
        item.key === "combined" ? "<div class=\"delay\"></div>" : "<div class=\"delay\" id=\"delay-" + item.key + "\">--</div>",
        "</div>",
        "</article>",
      ].join("")).join("");

      legendEl.innerHTML = series.map((item) => [
        "<span class=\"legendItem\" style=\"color:", item.color, "\">",
        "<span class=\"dot\"></span>", item.name,
        "</span>",
      ].join("")).join("");
    }

    function updateSummary(snapshot) {
      for (const item of series) {
        const price = exPrice(snapshot, item.key);
        const change = exChange(snapshot, item.key);
        const priceEl = document.getElementById("price-" + item.key);
        const changeEl = document.getElementById("change-" + item.key);
        priceEl.textContent = formatPrice(price);
        changeEl.textContent = signed(change);
        changeEl.className = "change " + (isNumber(change) && change >= 0 ? "positive" : "negative");

        if (item.key !== "combined") {
          document.getElementById("delay-" + item.key).textContent = formatDelay(exDelay(snapshot, item.key));
        }
      }

      windowEl.textContent = "Window " + timeLabel(snapshot.window_start) + " - " + timeLabel(snapshot.window_end);
      setStatus("Live " + new Date(snapshot.timestamp).toLocaleTimeString());
    }

    function exPrice(snapshot, key) {
      return key === "combined" ? snapshot.price : snapshot.exchanges[key]?.price;
    }

    function exDelay(snapshot, key) {
      return snapshot.exchanges[key]?.delay;
    }

    function exChange(snapshot, key) {
      return key === "combined" ? snapshot.change : snapshot.exchanges[key]?.change;
    }

    function ingest(snapshot) {
      latest = snapshot;
      points.push(snapshot);

      const minTs = snapshot.timestamp - chartWindowMs;
      while (points.length && points[0].timestamp < minTs) {
        points.shift();
      }

      if (points.length > maxChartPoints) {
        points.splice(0, points.length - maxChartPoints);
      }

      updateSummary(snapshot);
      needsRender = true;
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.floor(rect.width * dpr));
      const height = Math.max(1, Math.floor(rect.height * dpr));

      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
        needsRender = true;
      }
    }

    function paddedRange(min, max) {
      const span = Math.max(max - min, 2);
      const pad = Math.max(span * 0.18, 1);
      return [
        Math.floor((min - pad) / 10) * 10,
        Math.ceil((max + pad) / 10) * 10,
      ];
    }

    function drawGrid(plot, minPrice, maxPrice) {
      ctx.save();
      ctx.strokeStyle = "#e6e9ee";
      ctx.fillStyle = "#6d7683";
      ctx.lineWidth = 1;
      ctx.font = "12px ui-sans-serif, system-ui, sans-serif";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";

      const step = 10;
      const first = Math.ceil(minPrice / step) * step;
      for (let value = first; value <= maxPrice; value += step) {
        const y = plot.top + (maxPrice - value) / (maxPrice - minPrice) * plot.height;
        ctx.beginPath();
        ctx.moveTo(plot.left, y);
        ctx.lineTo(plot.left + plot.width, y);
        ctx.stroke();
        ctx.fillText(compactPriceFormat.format(value), plot.left + plot.width + 12, y);
      }

      if (latest) {
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        const endMs = latest.timestamp;
        const startMs = endMs - chartWindowMs;
        for (let i = 0; i <= 5; i += 1) {
          const x = plot.left + (plot.width * i / 5);
          const seconds = Math.floor((startMs + (chartWindowMs * i / 5)) / 1000);
          ctx.fillText(timeLabel(seconds), x, plot.top + plot.height + 12);
        }
      }

      ctx.restore();
    }

    function drawBaseline(plot, minPrice, maxPrice) {
      const base = latest?.baseline;
      if (!isNumber(base)) {
        return;
      }

      const y = plot.top + (maxPrice - base) / (maxPrice - minPrice) * plot.height;
      ctx.save();
      ctx.strokeStyle = "#f08c00";
      ctx.globalAlpha = 0.45;
      ctx.setLineDash([8, 8]);
      ctx.beginPath();
      ctx.moveTo(plot.left, y);
      ctx.lineTo(plot.left + plot.width, y);
      ctx.stroke();
      ctx.restore();
    }

    function drawSeries(plot, minPrice, maxPrice) {
      if (!latest || points.length < 2) {
        return;
      }

      const endMs = latest.timestamp;
      const startMs = endMs - chartWindowMs;
      const spanMs = endMs - startMs;

      for (const item of series) {
        ctx.save();
        ctx.strokeStyle = item.color;
        ctx.lineWidth = item.width || 1.8;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";

        const path = [];
        for (const point of points) {
          const price = exPrice(point, item.key);
          if (!isNumber(price)) {
            continue;
          }

          const x = plot.left + ((point.timestamp - startMs) / spanMs) * plot.width;
          const y = plot.top + (maxPrice - price) / (maxPrice - minPrice) * plot.height;
          path.push({ x, y });
        }

        if (path.length >= 2) {
          ctx.beginPath();
          ctx.moveTo(path[0].x, path[0].y);

          if (path.length === 2) {
            ctx.lineTo(path[1].x, path[1].y);
          } else {
            for (let i = 0; i < path.length - 1; i += 1) {
              const p0 = path[Math.max(0, i - 1)];
              const p1 = path[i];
              const p2 = path[i + 1];
              const p3 = path[Math.min(path.length - 1, i + 2)];
              const cp1x = p1.x + (p2.x - p0.x) / 6;
              const cp1y = p1.y + (p2.y - p0.y) / 6;
              const cp2x = p2.x - (p3.x - p1.x) / 6;
              const cp2y = p2.y - (p3.y - p1.y) / 6;
              ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
            }
          }

          ctx.stroke();
        }

        ctx.restore();
      }
    }

    function render() {
      resizeCanvas();

      if (!needsRender) {
        requestAnimationFrame(render);
        return;
      }

      needsRender = false;
      const dpr = window.devicePixelRatio || 1;
      const width = canvas.width;
      const height = canvas.height;
      ctx.clearRect(0, 0, width, height);
      ctx.save();
      ctx.scale(dpr, dpr);

      const cssWidth = width / dpr;
      const cssHeight = height / dpr;
      const plot = {
        left: 18,
        top: 18,
        width: Math.max(100, cssWidth - 110),
        height: Math.max(120, cssHeight - 58),
      };

      if (!latest || points.length === 0) {
        ctx.fillStyle = "#6d7683";
        ctx.font = "14px ui-sans-serif, system-ui, sans-serif";
        ctx.fillText("Waiting for exchange feeds", 18, 28);
        ctx.restore();
        requestAnimationFrame(render);
        return;
      }

      let minValue = Infinity;
      let maxValue = -Infinity;
      for (const point of points) {
        for (const item of series) {
          const price = exPrice(point, item.key);
          if (isNumber(price)) {
            if (price < minValue) minValue = price;
            if (price > maxValue) maxValue = price;
          }
        }
      }

      if (!Number.isFinite(minValue) || !Number.isFinite(maxValue)) {
        ctx.restore();
        requestAnimationFrame(render);
        return;
      }

      const [minPrice, maxPrice] = paddedRange(minValue, maxValue);
      drawGrid(plot, minPrice, maxPrice);
      drawBaseline(plot, minPrice, maxPrice);
      drawSeries(plot, minPrice, maxPrice);
      ctx.restore();
      requestAnimationFrame(render);
    }

    function connect() {
      const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
      socket = new WebSocket(protocol + "//" + window.location.host + "/ws");

      socket.onopen = () => {
        setStatus("Connected");
      };

      socket.onmessage = (event) => {
        ingest(JSON.parse(event.data));
      };

      socket.onclose = () => {
        setStatus("Reconnecting");
        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connect, 1000);
      };

      socket.onerror = () => {
        setStatus("Reconnecting");
        socket.close();
      };
    }

    renderStaticUi();
    connect();
    window.addEventListener("resize", () => {
      needsRender = true;
    });
    requestAnimationFrame(render);
  </script>
</body>
</html>
